version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: web-unspec-postgres
    environment:
      POSTGRES_DB: gpon_network
      POSTGRES_USER: gpon_user
      POSTGRES_PASSWORD: gpon_secure_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gpon_user -d gpon_network" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://wargaonlineceria.my.id
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgresql://gpon_user:gpon_secure_pass_2026@postgres:5432/gpon_network
    volumes:
      - ./backend:/app
      - ./WOC_MASTER_DOCUMENT.md:/WOC_MASTER_DOCUMENT.md
      - ./README.md:/README.md
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
