version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: web-unspec-postgres
    environment:
      POSTGRES_DB: gpon_network
      POSTGRES_USER: gpon_user
      POSTGRES_PASSWORD: gpon_secure_pass_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gpon_user -d gpon_network" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: web-unspec-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

  certbot:
    image: certbot/certbot
    container_name: web-unspec-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://wargaonlineceria.my.id
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgresql://gpon_user:gpon_secure_pass_2026@postgres:5432/gpon_network
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
